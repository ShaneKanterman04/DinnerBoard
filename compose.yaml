services:
  web:
    build: .
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      NEXT_PUBLIC_APP_NAME: DinnerBoard
    volumes:
      - dinnerboard-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  dinnerboard-data:

